{% extends 'main/base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Редагування профілю</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-group mb-3">
            <label>Ім'я</label>
            {{ form.username }}
        </div>

        <div class="form-group mb-3">
            <label>Email</label>
            {{ form.email }}
        </div>

        <button type="submit" class="btn btn-primary">
            Зберегти зміни
        </button>

        <a href="{% url 'profile' %}" class="btn btn-secondary">
            Скасувати
        </a>
    </form>
</div>
{% endblock %}
