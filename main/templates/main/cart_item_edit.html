{% extends 'main/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Редагування позиції кошика</h2>

    <h5>{{ item.model.name }}</h5>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Зберегти зміни
        </button>

        <a href="{% url 'cart_detail' %}" class="btn btn-secondary">
            Назад
        </a>
    </form>
</div>
{% endblock %}
